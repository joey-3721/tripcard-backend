services:
  api:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: tripcard-backend
    restart: unless-stopped
    ports:
      - "2778:2778"
    env_file:
      - .env
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      NO_PROXY: ${NO_PROXY:-}
      no_proxy: ${no_proxy:-}
